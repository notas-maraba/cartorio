<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1º Tabelionato de Notas de Marabá — Sistema de Protocolos</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<!-- Tabler Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f9f8f5;--border:#e2e0da;
  --text:#1a1917;--muted:#6b6860;--accent:#1a3a5c;--accent2:#c8a96e;
  --green:#2d6a4f;--red:#8b1a1a;--amber:#7a5c1a;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:6px;--r2:10px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);padding:2rem}
.login-card{background:var(--surface);border-radius:var(--r2);padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .seal{width:72px;height:72px;background:var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-bottom:1rem}
.login-logo h1{font-size:17px;font-weight:600;color:var(--accent);line-height:1.4}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,58,92,.08)}
.field textarea{resize:vertical;min-height:80px}
.field input:disabled,.field select:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#122d4a}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}.btn-danger:hover{background:#fca5a5}
.btn-success{background:#dcfce7;color:var(--green);border:1px solid #86efac}.btn-success:hover{background:#bbf7d0}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:var(--red);font-size:12px;margin-top:6px;padding:8px 10px;background:#fee2e2;border-radius:var(--r);border:1px solid #fca5a5}
.success-msg{color:var(--green);font-size:12px;margin-top:6px;padding:8px 10px;background:#dcfce7;border-radius:var(--r);border:1px solid #86efac}

/* SETUP SCREEN */
.setup-wrap{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;background:var(--accent);padding:2rem;overflow-y:auto}
.setup-card{background:var(--surface);border-radius:var(--r2);padding:2.5rem;width:100%;max-width:600px;margin:auto}
.setup-card h2{font-size:18px;font-weight:600;color:var(--accent);margin-bottom:.5rem}
.setup-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.step{display:flex;gap:1rem;margin-bottom:1.25rem;align-items:flex-start}
.step-num{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;margin-top:2px}
.step-content{flex:1}
.step-title{font-size:13px;font-weight:600;margin-bottom:4px}
.step-desc{font-size:12px;color:var(--muted);line-height:1.5}
.code-box{background:#1a1917;color:#c8a96e;font-family:var(--mono);font-size:12px;padding:12px;border-radius:var(--r);margin-top:8px;line-height:1.6;word-break:break-all}
.divider{height:1px;background:var(--border);margin:1.5rem 0}

/* TOP BAR */
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;flex:1}
.topbar-brand span{color:var(--accent2);font-family:var(--mono);font-size:11px;display:block;font-weight:400;opacity:.9}
.topbar-user{font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.user-badge{width:30px;height:30px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.sync-indicator{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;font-size:12px;border-radius:var(--r);cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-logout:hover{background:rgba(255,255,255,.2)}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{padding:9px 1.25rem;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;border-left:3px solid transparent;transition:all .1s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#e8f0f8;color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item i{font-size:17px}
.nav-section{padding:12px 1.25rem 4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.main{flex:1;overflow-y:auto;padding:1.75rem;max-width:1200px}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;color:var(--accent)}
.page-subtitle{font-size:12px;color:var(--muted);margin-top:3px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600;color:var(--text)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-value{font-size:30px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.proto-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);background:#e8f0f8;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;display:inline-block}
.badge-compra{background:#dbeafe;color:#1e40af}
.badge-rural{background:#dcfce7;color:#166534}
.badge-divorcio{background:#fce7f3;color:#9d174d}
.badge-inventario{background:#fef3c7;color:#92400e}
.badge-doacao{background:#f3e8ff;color:#6b21a8}
.badge-testamento{background:#ffedd5;color:#9a3412}
.badge-supervisor{background:#fef3c7;color:#92400e}
.badge-escrevente{background:#dbeafe;color:#1e40af}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:1.5rem;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:820px;box-shadow:0 25px 80px rgba(0,0,0,.35);margin:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--surface);border-radius:var(--r2) var(--r2) 0 0;z-index:2}
.modal-title{font-size:16px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.modal-body{padding:1.5rem;max-height:calc(100vh - 200px);overflow-y:auto}
.modal-footer{padding:1.25rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;flex-wrap:wrap}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1;padding:2px 4px;border-radius:4px;flex-shrink:0}
.close-btn:hover{background:var(--surface2);color:var(--text)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.col-span-2{grid-column:span 2}
.section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:1.25rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}

/* CHECKLIST */
.checklist-section{margin-bottom:1.25rem}
.checklist-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:.75rem;padding:6px 10px;background:#e8f0f8;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.check-item:hover{background:var(--surface2)}
.check-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--accent);cursor:pointer}
.check-item label{cursor:pointer;line-height:1.5;font-size:13px}
.check-item.checked label{text-decoration:line-through;color:var(--muted)}
.checklist-progress{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;background:var(--surface2);padding:.75rem 1rem;border-radius:var(--r2)}
.progress-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s ease}
.progress-text{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}

/* COMMENTS */
.comment{padding:.875rem;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:.75rem}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap}
.comment-author{font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.comment-date{font-size:11px;color:var(--muted)}
.comment-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.comment-input-area{display:flex;gap:.75rem;margin-top:1rem;align-items:flex-end}
.comment-input-area textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;resize:none;height:70px}
.comment-input-area textarea:focus{border-color:var(--accent);outline:none}

/* FILTERS */
.filters{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface)}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);cursor:pointer}

/* PRINT COVER */
@media print {
  .no-print{display:none!important}
  .modal-overlay{position:static;background:none;padding:0;overflow:visible}
  .modal{box-shadow:none;max-width:100%;border:none}
  .modal-header,.modal-footer,#editableFields{display:none!important}
  .modal-body{max-height:none;padding:0;overflow:visible}
  body{background:white}
}
.cover-preview{background:white;border:1px solid #ccc;border-radius:var(--r2);padding:1.75rem;color:#000;max-width:100%}
.cover-header{text-align:center;border-bottom:2px solid #1a3a5c;padding-bottom:1rem;margin-bottom:1rem}
.cover-header h2{font-size:15px;color:#1a3a5c;font-weight:700;margin-bottom:3px}
.cover-header p{font-size:11px;color:#555;margin-top:2px}
.cover-proto{font-family:var(--mono);font-size:22px;font-weight:700;color:#1a3a5c;text-align:center;margin:1rem 0;padding:.75rem;background:#e8f0f8;border-radius:6px;letter-spacing:2px}
.cover-section{margin-bottom:1rem}
.cover-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#1a3a5c;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:.5rem}
.cover-row{display:flex;gap:.5rem;margin-bottom:.2rem}
.cover-label{font-size:11px;font-weight:600;color:#333;min-width:130px;flex-shrink:0}
.cover-val{font-size:11px;color:#111;flex:1}
.cover-docs{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.75rem}
.cover-footer{margin-top:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;padding-top:1rem;border-top:1px solid #ccc}
.cover-sig{text-align:center;padding-top:2rem;border-top:1px solid #333;font-size:10px;color:#333;margin-top:.5rem}

/* PRODUCTIVITY */
.prod-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.prod-name{width:150px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.prod-bar-wrap{flex:1;height:20px;background:var(--surface2);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.prod-bar-fill{height:100%;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;padding-left:8px;transition:width .5s ease;min-width:0}
.prod-bar-fill span{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
.prod-count{font-size:13px;font-family:var(--mono);font-weight:600;color:var(--accent);width:30px;text-align:right;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}

/* CHECKLIST EDITOR */
.cl-item-row{display:flex;align-items:center;gap:.5rem;padding:5px 6px;background:var(--surface2);border-radius:var(--r);margin-bottom:4px}
.cl-item-row input{flex:1;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;font-family:var(--font)}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);color:#fff;gap:1rem}
.loading-screen i{font-size:48px;animation:spin 1s linear infinite;opacity:.8}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* UTILS */
.flex{display:flex}.gap-sm{gap:.5rem}.gap-md{gap:.75rem}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}.fw-600{font-weight:600}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mt-lg{margin-top:1.5rem}.mb-sm{margin-bottom:.5rem}.mb-md{margin-bottom:1rem}
.divider-line{height:1px;background:var(--border);margin:1rem 0}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:500}
.empty-state{text-align:center;padding:3rem;color:var(--muted)}
.empty-state i{font-size:40px;display:block;margin-bottom:.75rem;opacity:.4}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#fff;padding:.75rem 1.25rem;border-radius:var(--r2);font-size:13px;z-index:9999;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>

</div>

// ============================================================
// FIREBASE INIT
// ============================================================
function isFirebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes("COLE_AQUI");
}

function initFirebase() {
  if (!isFirebaseConfigured()) {
    renderSetupScreen();
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    state.firebaseConfigured = true;
    loadInitialData();
  } catch(e) {
    showError("Erro ao conectar com Firebase: " + e.message);
  }
}

async function loadInitialData() {
  document.getElementById('app').innerHTML = `<div class="loading-screen"><i class="ti ti-loader-2"></i><div style="font-size:16px;font-weight:500">Carregando dados...</div></div>`;
  try {
    // Load users
    const usersSnap = await db.collection('users').get();
    if (usersSnap.empty) {
      // First time: create default supervisor
      await db.collection('users').doc('sup1').set({
        id: 'sup1', name: 'Supervisor', username: 'supervisor',
        password: 'master123', role: 'supervisor',
        createdAt: new Date().toISOString()
      });
      state.users = [{id:'sup1', name:'Supervisor', username:'supervisor', password:'master123', role:'supervisor', createdAt:new Date().toISOString()}];
    } else {
      state.users = usersSnap.docs.map(d => d.data());
    }
    // Load checklists
    const clSnap = await db.collection('config').doc('checklists').get();
    if (clSnap.exists) state.checklists = clSnap.data().data;
    else await db.collection('config').doc('checklists').set({data: state.checklists});
    // Subscribe to processes (real-time)
    subscribeProcesses();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading-screen"><div style="font-size:16px;font-weight:500;color:#f87171">Erro ao carregar: ${e.message}</div><button onclick="location.reload()" style="margin-top:1rem;padding:8px 20px;border-radius:6px;border:none;cursor:pointer">Tentar novamente</button></div>`;
  }
}

function subscribeProcesses() {
  if (state.unsubProcesses) state.unsubProcesses();
  state.unsubProcesses = db.collection('processes').orderBy('createdAt','desc').onSnapshot(snap => {
    state.processes = snap.docs.map(d => d.data());
    if (state.currentUser) {
      render();
      if (state.modal === 'ver_processo' && state.selectedProcess) {
        const updated = state.processes.find(p => p.id === state.selectedProcess.id);
        if (updated) state.selectedProcess = updated;
      }
    } else {
      renderLogin();
    }
  }, err => {
    console.error('Firestore error:', err);
  });
}

// ============================================================
// HELPERS
// ============================================================
function getNaturezaInfo(key) {
  return NATUREZAS.find(n => n.key === key) || {key, label: key, badge:"badge-compra"};
}

function getChecklistProgress(process) {
  if (!process.checklist) return {done:0, total:0, pct:0};
  const cl = state.checklists[process.natureza];
  if (!cl) return {done:0, total:0, pct:0};
  let total=0, done=0;
  cl.sections.forEach((s,si) => s.items.forEach((_,ii) => {
    total++;
    if (process.checklist[si] && process.checklist[si][ii]) done++;
  }));
  return {done, total, pct: total ? Math.round(done/total*100) : 0};
}

function getUserName(id) {
  const u = state.users.find(u=>u.id===id);
  return u ? u.name : (id || 'Desconhecido');
}

function initChecklist(natureza) {
  const cl = state.checklists[natureza];
  if (!cl) return {};
  const obj = {};
  cl.sections.forEach((_,si) => { obj[si] = {}; });
  return obj;
}

function generateProto() {
  const nums = state.processes.map(p => parseInt(p.protocol.replace(/\D/g,''))).filter(n=>!isNaN(n));
  const next = nums.length ? Math.max(...nums) + 1 : 1;
  return String(next).padStart(8, '0');
}

function showToast(msg, type='success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<i class="ti ti-${type==='success'?'check':'alert-triangle'}" aria-hidden="true"></i> ${msg}`;
  if (type==='error') t.style.background='var(--red)';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function initials(name) {
  return (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '??';
}

function render() {

  if (!state.currentUser) { app.innerHTML = renderLoginHTML(); bindLogin(); return; }
  app.innerHTML = renderAppHTML();
  bindApp();
  if (state.modal) { renderModal(); }
}

function renderLogin() {
  document.getElementById('app').innerHTML = renderLoginHTML();
  bindLogin();
}

  return `<div class="login-wrap">

function bindLogin() {
  const doLogin = () => {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const user = state.users.find(x => x.username===u && x.password===p);
    if (user) { state.currentUser = user; render(); }
    else { document.getElementById('lErr').innerHTML = '<div class="error-msg"><i class="ti ti-alert-triangle"></i> Usuário ou senha incorretos.</div>'; }
  };
  document.getElementById('btnLogin').onclick = doLogin;
  document.getElementById('lPass').onkeydown = e => { if(e.key==='Enter') doLogin(); };
  document.getElementById('lUser').focus();
}

// ---- PRODUTIVIDADE ----
function renderProdutividade() {
  const counts={}, commentCounts={};
  state.users.forEach(u=>{counts[u.id]=0;commentCounts[u.id]=0;});
  state.processes.forEach(p=>{counts[p.createdBy]=(counts[p.createdBy]||0)+1;});
  state.processes.forEach(p=>(p.comments||[]).forEach(c=>{commentCounts[c.authorId]=(commentCounts[c.authorId]||0)+1;}));
  const sorted=state.users.map(u=>({user:u,count:counts[u.id]||0})).sort((a,b)=>b.count-a.count);
  const max=sorted.length?Math.max(sorted[0].count,1):1;
  const totalComments=Object.values(commentCounts).reduce((a,b)=>a+b,0);
  return `
  <div class="page-header"><div><div class="page-title">Produtividade</div><div class="page-subtitle">Visão geral por funcionário</div></div></div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem">
    <div class="card">
      <div class="card-header"><div class="card-title"><i class="ti ti-trophy" style="color:var(--accent2)" aria-hidden="true"></i> Protocolos abertos por funcionário</div></div>
      ${sorted.map((row,i)=>`<div class="prod-bar">
        <div class="prod-name">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}<strong>${row.user.name.split(' ').slice(0,2).join(' ')}</strong></div>
        <div class="prod-bar-wrap"><div class="prod-bar-fill" style="width:${row.count?Math.max(row.count/max*100,3):0}%;background:${i===0?'var(--accent2)':i===1?'var(--accent)':'var(--muted)'}">
          ${row.count>0?`<span>${row.count}</span>`:''}
        </div></div>
        <div class="prod-count" style="color:${i===0?'var(--accent2)':'var(--accent)'}">${row.count}</div>
      </div>`).join('')}
    </div>
    <div>
      <div class="card" style="margin-bottom:1rem">
        <div class="card-title" style="margin-bottom:1rem">Resumo</div>
        <div class="stat-label">Total de protocolos</div><div class="stat-value">${state.processes.length}</div>
        <div class="divider-line"></div>
        <div class="stat-label">Total de comentários</div><div class="stat-value" style="font-size:22px">${totalComments}</div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:.75rem">Comentários por usuário</div>
        ${state.users.map(u=>`<div class="flex justify-between items-center" style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
          <span>${u.name.split(' ').slice(0,2).join(' ')}</span>
          <span style="font-family:var(--mono);font-weight:600;color:var(--accent)">${commentCounts[u.id]||0}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderModal() {
  let existing = document.getElementById('modalOverlay');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'modalOverlay';
  el.className = 'modal-overlay no-print';
  el.innerHTML = getModalHTML();
  document.body.appendChild(el);
  bindModal();
}

function getModalHTML() {
  switch(state.modal) {
    case 'novo_processo':     return modalNovoProcesso();
    case 'ver_processo':      return modalVerProcesso();
    case 'imprimir_capa':     return modalImprimirCapa();
    case 'novo_usuario':      return modalNovoUsuario();
    case 'editar_checklist':  return modalEditarChecklist();
    case 'novo_checklist':    return modalNovoChecklist();

}

function tabChecklist(p, cl) {

  const {done,total,pct} = getChecklistProgress(p);
  return `<div>

      const sectionDone = s.items.filter((_,ii)=>p.checklist&&p.checklist[si]&&p.checklist[si][ii]).length;

        <div class="checklist-section-title">${s.title}<span class="text-xs">${sectionDone}/${s.items.length}</span></div>
        ${s.items.map((item,ii)=>{
          const checked=p.checklist&&p.checklist[si]&&p.checklist[si][ii];
          return `<div class="check-item${checked?' checked':''}">
            <input type="checkbox" ${checked?'checked':''} id="chk_${si}_${ii}" data-si="${si}" data-ii="${ii}">

          </div>`;
        }).join('')}

    }).join('')}
  </div>`;
}

              `).join('')}
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-top:.5rem" data-add-item="${si}"><i class="ti ti-plus" aria-hidden="true"></i> Adicionar item</button>
          </div>
        `).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" id="btnAddSection" style="margin-top:.5rem"><i class="ti ti-plus" aria-hidden="true"></i> Nova seção</button>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" id="closeModal2">Cancelar</button><button class="btn btn-primary" id="btnSalvarChecklist"><i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar checklist</button></div>
  </div>`;
}

function modalNovoChecklist() {
  return `<div class="modal" style="max-width:480px">
    <div class="modal-header"><div class="modal-title"><i class="ti ti-plus" aria-hidden="true"></i> Novo Checklist</div><button class="close-btn" id="closeModal">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Identificador único (sem espaços)</label><input id="ncl_key" type="text" placeholder="ex: procuracao_pf"></div>
      <div class="field"><label>Nome do checklist</label><input id="ncl_name" type="text" placeholder="ex: Escritura de Procuração"></div>
      <div id="ncl_err"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" id="closeModal2">Cancelar</button><button class="btn btn-primary" id="btnCriarChecklist"><i class="ti ti-check" aria-hidden="true"></i> Criar</button></div>
  </div>`;
}

// ============================================================
// BIND
// ============================================================
function bindApp() {
  document.getElementById('btnLogout').onclick = () => { state.currentUser=null; render(); };
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.onclick=()=>{state.page=el.dataset.page;render();});

  const btnNP = document.getElementById('btnNovoProcesso');
  if (btnNP) btnNP.onclick = ()=>{state.modal='novo_processo';renderModal();};
  const btnNU = document.getElementById('btnNovoUsuario');
  if (btnNU) btnNU.onclick = ()=>{state.modal='novo_usuario';renderModal();};
  const btnNCL = document.getElementById('btnNovoChecklist');
  if (btnNCL) btnNCL.onclick = ()=>{state.modal='novo_checklist';renderModal();};

  const si = document.getElementById('searchInput');
  if (si) si.oninput = e=>{state.search=e.target.value;render();};
  const fn = document.getElementById('filterNat');
  if (fn) fn.onchange = e=>{state.filterNatureza=e.target.value;render();};

  document.querySelectorAll('[data-open]').forEach(btn=>{
    btn.onclick=()=>{state.selectedProcess=state.processes.find(p=>p.id===btn.dataset.open);state.activeTab='dados';state.modal='ver_processo';renderModal();};
  });
  document.querySelectorAll('[data-print]').forEach(btn=>{
    btn.onclick=()=>{state.selectedProcess=state.processes.find(p=>p.id===btn.dataset.print);state.modal='imprimir_capa';renderModal();};
  });
  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('Tem certeza que deseja EXCLUIR este protocolo? Esta ação não pode ser desfeita.'))return;
      setSyncing(true);
      await db.collection('processes').doc(btn.dataset.delete).delete();
      setSyncing(false);
      showToast('Protocolo excluído.');
    };
  });
  document.querySelectorAll('[data-del-user]').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('Excluir este usuário?'))return;
      await db.collection('users').doc(btn.dataset.delUser).delete();
      state.users=state.users.filter(u=>u.id!==btn.dataset.delUser);
      render();showToast('Usuário excluído.');
    };
  });
  document.querySelectorAll('[data-edit-cl]').forEach(btn=>{
    btn.onclick=()=>{state.editingChecklist=btn.dataset.editCl;state.modal='editar_checklist';renderModal();};
  });
}

function bindModal() {
  const ov = document.getElementById('modalOverlay'); if(!ov) return;
  ov.querySelectorAll('#closeModal,#closeModal2').forEach(btn=>btn.onclick=()=>{state.modal=null;ov.remove();});

  // NOVO PROCESSO
  const btnSP = document.getElementById('btnSalvarProcesso');
  if (btnSP) btnSP.onclick = async()=>{
    const proto=document.getElementById('fProto').value.trim();
    const nat=document.getElementById('fNatureza').value;
    const vend=document.getElementById('fVendedor').value.trim();
    const da=document.getElementById('fDataAbertura').value;
    if(!proto||!nat||!vend||!da){document.getElementById('novoProtoErr').innerHTML='<div class="error-msg">Preencha os campos obrigatórios: Protocolo, Natureza, Vendedor/Transmitente e Data de Abertura.</div>';return;}
    if(state.processes.find(p=>p.protocol===proto)){document.getElementById('novoProtoErr').innerHTML='<div class="error-msg">Já existe um processo com este número de protocolo.</div>';return;}
    btnSP.disabled=true; btnSP.innerHTML='<div class="spinner"></div> Salvando...';
    const np={
      id:'p'+Date.now()+Math.random().toString(36).slice(2,7),
      protocol:proto, natureza:nat, vendedor:vend,
      comprador:document.getElementById('fComprador').value.trim(),
      matriculas:document.getElementById('fMatriculas').value.trim(),
      dataAbertura:da,
      dataAssinatura:document.getElementById('fDataAssinatura').value,
      responsavel:document.getElementById('fResponsavel').value.trim(),
      valor:document.getElementById('fValor').value.trim(),
      createdBy:state.currentUser.id,
      createdAt:new Date().toISOString(),
      checklist:initChecklist(nat),
      comments:[]
    };
    setSyncing(true);
    await db.collection('processes').doc(np.id).set(np);
    setSyncing(false);
    state.selectedProcess=np; state.activeTab='dados'; state.modal='ver_processo';
    ov.remove(); render(); renderModal();
    showToast('Protocolo '+proto+' criado com sucesso!');
  };

  // TABS
  ov.querySelectorAll('.tab[data-tab]').forEach(tab=>tab.onclick=()=>{state.activeTab=tab.dataset.tab;ov.innerHTML=getModalHTML();bindModal();});

  // SALVAR EDIÇÃO
  const btnSE = document.getElementById('btnSalvarEdicao');
  if (btnSE) btnSE.onclick = async()=>{
    const p=state.selectedProcess;
    const updated={...p,
      protocol:document.getElementById('ep_proto').value.trim(),
      vendedor:document.getElementById('ep_vendedor').value.trim(),
      comprador:document.getElementById('ep_comprador').value.trim(),
      matriculas:document.getElementById('ep_matriculas').value.trim(),
      dataAbertura:document.getElementById('ep_dataAbertura').value,
      dataAssinatura:document.getElementById('ep_dataAssinatura').value,
      responsavel:document.getElementById('ep_responsavel').value.trim(),
      valor:document.getElementById('ep_valor').value.trim()
    };
    btnSE.disabled=true; setSyncing(true);
    await db.collection('processes').doc(p.id).update(updated);
    setSyncing(false);
    state.selectedProcess=updated;
    const idx=state.processes.findIndex(x=>x.id===p.id);
    if(idx>=0) state.processes[idx]=updated;
    ov.innerHTML=getModalHTML(); bindModal();
    showToast('Alterações salvas!');
  };

  // CHECKLIST
  ov.querySelectorAll('input[type=checkbox][data-si]').forEach(el=>{
    el.onchange=async(e)=>{
      const si=parseInt(e.target.dataset.si), ii=parseInt(e.target.dataset.ii);
      const p=state.selectedProcess;
      if(!p.checklist[si]) p.checklist[si]={};
      p.checklist[si][ii]=e.target.checked;
      setSyncing(true);
      await db.collection('processes').doc(p.id).update({checklist:p.checklist});
      setSyncing(false);
      const idx=state.processes.findIndex(x=>x.id===p.id);
      if(idx>=0) state.processes[idx]={...p};
      ov.innerHTML=getModalHTML(); bindModal();
    };
  });

  // COMENTÁRIOS
  const btnAC = document.getElementById('btnAddComment');
  if (btnAC) {
    const sendComment = async()=>{
      const text=document.getElementById('newComment').value.trim(); if(!text) return;
      const p=state.selectedProcess;
      const comments=[...(p.comments||[]),{id:'c'+Date.now(),authorId:state.currentUser.id,text,createdAt:new Date().toISOString()}];
      setSyncing(true);
      await db.collection('processes').doc(p.id).update({comments});
      setSyncing(false);
      p.comments=comments;
      const idx=state.processes.findIndex(x=>x.id===p.id);
      if(idx>=0) state.processes[idx]={...p};
      ov.innerHTML=getModalHTML(); bindModal();
    };
    btnAC.onclick=sendComment;
    const nc=document.getElementById('newComment');
    if(nc) nc.onkeydown=e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))sendComment();};
  }
  ov.querySelectorAll('[data-del-comment]').forEach(btn=>{
    btn.onclick=async()=>{
      const ci=parseInt(btn.dataset.delComment);
      const p=state.selectedProcess;
      const comments=[...(p.comments||[])]; comments.splice(ci,1);
      setSyncing(true);
      await db.collection('processes').doc(p.id).update({comments});
      setSyncing(false);
      p.comments=comments;
      const idx=state.processes.findIndex(x=>x.id===p.id);
      if(idx>=0) state.processes[idx]={...p};
      ov.innerHTML=getModalHTML(); bindModal();
    };
  });

  // PRINT COVER
  const btnPFM=document.getElementById('btnPrintFromModal');
  if(btnPFM) btnPFM.onclick=()=>{state.modal='imprimir_capa';ov.innerHTML=getModalHTML();bindModal();};
  const btnRC=document.getElementById('btnRefreshCover');
  if(btnRC) btnRC.onclick=()=>{
    const vv=document.getElementById('cv_v').value;
    const cv=document.getElementById('cv_c').value;
    const dd=document.getElementById('cv_d').value;
    const pv=document.getElementById('cvp_v'),pc=document.getElementById('cvp_c'),pd=document.getElementById('cvp_d');
    if(pv)pv.textContent=vv||'—';
    if(pc)pc.textContent=cv||'—';
    if(pd)pd.textContent=dd?new Date(dd+'T12:00:00').toLocaleDateString('pt-BR'):'—';
  };

  // NOVO USUARIO
  const btnSU=document.getElementById('btnSalvarUsuario');
  if(btnSU) btnSU.onclick=async()=>{
    const nome=document.getElementById('nu_nome').value.trim();
    const user=document.getElementById('nu_user').value.trim();
    const pass=document.getElementById('nu_pass').value;
    const role=document.getElementById('nu_role').value;
    if(!nome||!user||!pass){document.getElementById('nu_err').innerHTML='<div class="error-msg">Preencha todos os campos.</div>';return;}
    if(pass.length<6){document.getElementById('nu_err').innerHTML='<div class="error-msg">A senha deve ter pelo menos 6 caracteres.</div>';return;}
    if(state.users.find(u=>u.username===user)){document.getElementById('nu_err').innerHTML='<div class="error-msg">Este nome de usuário já existe.</div>';return;}
    const nu={id:'u'+Date.now(),name:nome,username:user,password:pass,role,createdAt:new Date().toISOString()};
    await db.collection('users').doc(nu.id).set(nu);
    state.users.push(nu);
    state.modal=null; ov.remove(); render();
    showToast('Usuário '+nome+' criado com sucesso!');
  };

  // EDITAR CHECKLIST
  const btnSCL=document.getElementById('btnSalvarChecklist');
  if(btnSCL) btnSCL.onclick=async()=>{
    const key=state.editingChecklist;
    const cl=JSON.parse(JSON.stringify(state.checklists[key]));
    cl.name=document.getElementById('cl_name').value.trim();
    cl.sections.forEach((s,si)=>{
      const te=ov.querySelector(`.cl_sec_title[data-si="${si}"]`);
      if(te) s.title=te.value;
      const items=[];
      ov.querySelectorAll(`.cl_item_text[data-si="${si}"]`).forEach(el=>items.push(el.value));
      s.items=items;
    });
    state.checklists[key]=cl;
    btnSCL.disabled=true; setSyncing(true);
    await db.collection('config').doc('checklists').set({data:state.checklists});
    setSyncing(false);
    state.modal=null; ov.remove(); render();
    showToast('Checklist salvo!');
  };
  ov.querySelectorAll('[data-add-item]').forEach(btn=>btn.onclick=()=>{
    const si=parseInt(btn.dataset.addItem);
    state.checklists[state.editingChecklist].sections[si].items.push('Novo item');
    ov.innerHTML=getModalHTML(); bindModal();
  });
  ov.querySelectorAll('[data-del-item]').forEach(btn=>btn.onclick=()=>{
    const[si,ii]=btn.dataset.delItem.split('-').map(Number);
    state.checklists[state.editingChecklist].sections[si].items.splice(ii,1);
    ov.innerHTML=getModalHTML(); bindModal();
  });
  ov.querySelectorAll('[data-del-sec]').forEach(btn=>btn.onclick=()=>{
    const si=parseInt(btn.dataset.delSec);
    if(!confirm('Remover esta seção?'))return;
    state.checklists[state.editingChecklist].sections.splice(si,1);
    ov.innerHTML=getModalHTML(); bindModal();
  });
  const btnAS=document.getElementById('btnAddSection');
  if(btnAS) btnAS.onclick=()=>{state.checklists[state.editingChecklist].sections.push({title:'Nova Seção',items:['Novo item']});ov.innerHTML=getModalHTML();bindModal();};

  // NOVO CHECKLIST
  const btnCCL=document.getElementById('btnCriarChecklist');
  if(btnCCL) btnCCL.onclick=async()=>{
    const key=document.getElementById('ncl_key').value.trim().replace(/[\s\/]/g,'_');
    const name=document.getElementById('ncl_name').value.trim();
    if(!key||!name){document.getElementById('ncl_err').innerHTML='<div class="error-msg">Preencha chave e nome.</div>';return;}
    if(state.checklists[key]){document.getElementById('ncl_err').innerHTML='<div class="error-msg">Esta chave já existe. Escolha outro identificador.</div>';return;}
    state.checklists[key]={name,sections:[{title:'Documentos necessários',items:['Item 1']}]};
    state.editingChecklist=key; state.modal='editar_checklist';
    ov.innerHTML=getModalHTML(); bindModal();
  };
}

function setSyncing(v) {
  state.syncing=v;
  const dot=document.querySelector('.sync-dot');
  const txt=dot?.nextSibling;
  if(dot){dot.className='sync-dot'+(v?' syncing':'');}
  if(txt&&txt.nodeType===3) txt.textContent=v?'Salvando...':'Sincronizado';
}
