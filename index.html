<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0da;
  --text:#1a1917;--muted:#6b6860;--accent:#1a3a5c;--accent2:#c8a96e;
  --green:#2d6a4f;--red:#8b1a1a;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--r:6px;--r2:10px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);padding:2rem}
.login-card{background:var(--surface);border-radius:var(--r2);padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .seal{width:72px;height:72px;background:var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-bottom:1rem}
.login-logo h1{font-size:17px;font-weight:600;color:var(--accent);line-height:1.4}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,58,92,.08)}
.field textarea{resize:vertical;min-height:80px}
.field input:disabled,.field select:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#122d4a}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}.btn-danger:hover{background:#fca5a5}
.btn-success{background:#dcfce7;color:var(--green);border:1px solid #86efac}
.btn-warning{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.btn-info{background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:var(--red);font-size:12px;padding:8px 10px;background:#fee2e2;border-radius:var(--r);border:1px solid #fca5a5;margin-top:6px}
/* TOPBAR */
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;flex:1}
.topbar-brand span{color:var(--accent2);font-family:var(--mono);font-size:11px;display:block;font-weight:400}
.topbar-user{font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.user-badge{width:30px;height:30px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;font-size:12px;border-radius:var(--r);cursor:pointer;font-family:var(--font)}
/* LAYOUT */
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{padding:9px 1.25rem;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;border-left:3px solid transparent;transition:all .1s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#e8f0f8;color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item i{font-size:17px}
.nav-section{padding:12px 1.25rem 4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.main{flex:1;overflow-y:auto;padding:1.75rem;max-width:1300px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;color:var(--accent)}
.page-subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-value{font-size:30px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* STATUS */
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.sb1{background:#e0f2fe;color:#0369a1}.sb2{background:#fef9c3;color:#854d0e}.sb3{background:#fef3c7;color:#92400e}
.sb4{background:#fce7f3;color:#9d174d}.sb5{background:#f3e8ff;color:#6b21a8}.sb6{background:#dbeafe;color:#1e40af}
.sb7{background:#dcfce7;color:#166534}.sb8{background:#1a3a5c;color:#fff}
/* PIPELINE */
.pipeline{display:flex;gap:0;margin-bottom:1.5rem;overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden}
.pipe-step{flex:1;min-width:90px;padding:.75rem .5rem;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-right:1px solid var(--border)}
.pipe-step:last-child{border-right:none}
.pipe-step .pipe-count{font-size:22px;font-weight:700;font-family:var(--mono);display:block;margin-bottom:2px}
.pipe-step.active{outline:3px solid var(--accent);outline-offset:-3px;z-index:1}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.proto-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);background:#e8f0f8;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;display:inline-block}
.badge-compra{background:#dbeafe;color:#1e40af}.badge-rural{background:#dcfce7;color:#166534}
.badge-divorcio{background:#fce7f3;color:#9d174d}.badge-inventario{background:#fef3c7;color:#92400e}
.badge-doacao{background:#f3e8ff;color:#6b21a8}.badge-testamento{background:#ffedd5;color:#9a3412}
.badge-sup{background:#fef3c7;color:#92400e}.badge-esc{background:#dbeafe;color:#1e40af}
/* ALERTS */
.alert{padding:.75rem 1rem;border-radius:var(--r);font-size:12px;display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.75rem}
.alert-warning{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.alert-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--red)}
.alert-info{background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1}
.notif-badge{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-left:4px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:1.5rem;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:860px;box-shadow:0 25px 80px rgba(0,0,0,.35);margin:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--surface);border-radius:var(--r2) var(--r2) 0 0;z-index:2}
.modal-title{font-size:16px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.modal-body{padding:1.5rem;max-height:calc(100vh - 200px);overflow-y:auto}
.modal-footer{padding:1.25rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;flex-wrap:wrap}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1;padding:2px 4px;border-radius:4px}
.close-btn:hover{background:var(--surface2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.col-span-2{grid-column:span 2}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:1.25rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
/* PARTES (múltiplos vendedores/compradores) */
.parte-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;margin-bottom:.75rem;position:relative}
.parte-item .parte-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.parte-item .parte-label{font-size:12px;font-weight:600;color:var(--accent)}
.parte-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.parte-grid .field{margin-bottom:0}
/* CHECKLIST */
.checklist-section{margin-bottom:1.25rem}
.cl-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);padding:6px 10px;background:#e8f0f8;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.check-item:hover{background:var(--surface2)}
.check-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--accent);cursor:pointer}
.check-item label{cursor:pointer;line-height:1.5;font-size:13px}
.check-item.checked label{text-decoration:line-through;color:var(--muted)}
.prog-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;background:var(--surface2);padding:.75rem 1rem;border-radius:var(--r2)}
.prog-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
/* COMMENTS */
.comment{padding:.875rem;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:.75rem}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap}
.comment-author{font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.comment-date{font-size:11px;color:var(--muted)}
.comment-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.comment-box{display:flex;gap:.75rem;margin-top:1rem;align-items:flex-end}
.comment-box textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;resize:none;height:70px}
.comment-box textarea:focus{border-color:var(--accent);outline:none}
/* FILTERS */
.filters{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface)}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);cursor:pointer}
.filter-date{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text)}
/* COVER */
@media print{.no-print{display:none!important}.modal-overlay{position:static;background:none;padding:0}.modal{box-shadow:none;max-width:100%;border:none}.modal-header,.modal-footer,#editableFields{display:none!important}.modal-body{max-height:none;padding:0;overflow:visible}body{background:white}}
.cover-preview{background:white;border:1px solid #ccc;border-radius:var(--r2);padding:1.75rem;color:#000}
.cover-header{text-align:center;border-bottom:2px solid #1a3a5c;padding-bottom:1rem;margin-bottom:1rem}
.cover-header h2{font-size:15px;color:#1a3a5c;font-weight:700;margin-bottom:3px}
.cover-header p{font-size:11px;color:#555;margin-top:2px}
.cover-proto{font-family:var(--mono);font-size:22px;font-weight:700;color:#1a3a5c;text-align:center;margin:1rem 0;padding:.75rem;background:#e8f0f8;border-radius:6px;letter-spacing:2px}
.cover-section{margin-bottom:1rem}
.cover-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#1a3a5c;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:.5rem}
.cover-row{display:flex;gap:.5rem;margin-bottom:.2rem}
.cover-label{font-size:11px;font-weight:600;color:#333;min-width:130px;flex-shrink:0}
.cover-val{font-size:11px;color:#111;flex:1}
.cover-parte{font-size:11px;padding:3px 0;border-bottom:1px dotted #eee}
.cover-parte:last-child{border-bottom:none}
.cover-docs{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.75rem}
.cover-footer{margin-top:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;padding-top:1rem;border-top:1px solid #ccc}
.cover-sig{text-align:center;padding-top:2rem;border-top:1px solid #333;font-size:10px;color:#333;margin-top:.5rem}
/* PRODUCTIVITY */
.prod-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.prod-name{width:150px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.prod-bar-wrap{flex:1;height:20px;background:var(--surface2);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.prod-bar-fill{height:100%;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;padding-left:8px;transition:width .5s}
.prod-bar-fill span{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
.prod-count{font-size:13px;font-family:var(--mono);font-weight:600;color:var(--accent);width:30px;text-align:right;flex-shrink:0}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
/* CHECKLIST EDITOR */
.cl-item-row{display:flex;align-items:center;gap:.5rem;padding:5px 6px;background:var(--surface2);border-radius:var(--r);margin-bottom:4px}
.cl-item-row input{flex:1;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;font-family:var(--font)}
/* HISTORY */
.history-item{display:flex;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:12px}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cal-day{min-height:60px;padding:4px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-size:11px}
.cal-day.today{background:#e8f0f8;border-color:var(--accent)}
.cal-day.other-month{background:var(--surface2);opacity:.5}
.cal-day-num{font-weight:600;font-size:12px;margin-bottom:3px;display:block}
.cal-event{background:var(--accent);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event.assina{background:var(--green)}
/* NOTIF */
.notif-item{padding:.75rem;border-radius:var(--r);border:1px solid var(--border);margin-bottom:.5rem;display:flex;gap:.75rem;align-items:flex-start;cursor:pointer}
.notif-item.danger{border-color:#fca5a5;background:#fee2e2}
.notif-item.warning{border-color:#fde047;background:#fef9c3}
.notif-item.info{border-color:#7dd3fc;background:#e0f2fe}
/* UTILS */
.flex{display:flex}.gap-sm{gap:.5rem}.gap-md{gap:.75rem}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}.fw-600{font-weight:600}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mb-sm{margin-bottom:.5rem}.mb-md{margin-bottom:1rem}
.divider{height:1px;background:var(--border);margin:1rem 0}
.empty-state{text-align:center;padding:3rem;color:var(--muted)}
.empty-state i{font-size:40px;display:block;margin-bottom:.75rem;opacity:.4}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#fff;padding:.75rem 1.25rem;border-radius:var(--r2);font-size:13px;z-index:9999;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);color:#fff;gap:1rem}
.stale-badge{background:#fee2e2;color:var(--red);border-radius:4px;font-size:10px;padding:2px 6px;font-weight:600}
</style>
</head>

// Nomes resumidos para exibição
function partesNomes(partes){if(!partes||!partes.length)return '—';return partes.map(p=>p.nome||'').filter(Boolean).join(' e ');}
function partesCPFs(partes){if(!partes||!partes.length)return '';return partes.map(p=>p.cpf||'').filter(Boolean).join(' | ');}

function getClProg(p){
  const cl=S.checklists[p.natureza];if(!cl)return{done:0,total:0,pct:0};
  let t=0,d=0;
  cl.sections.forEach((s,si)=>s.items.forEach((_,ii)=>{t++;if(p.checklist&&p.checklist[si]&&p.checklist[si][ii])d++;}));
  return{done:d,total:t,pct:t?Math.round(d/t*100):0};
}
function initCl(nat){const cl=S.checklists[nat];if(!cl)return{};const o={};cl.sections.forEach((_,si)=>{o[si]={};});return o;}
function genProto(){const ns=S.processes.map(p=>parseInt(p.protocol.replace(/\D/g,''))).filter(n=>!isNaN(n));return String(ns.length?Math.max(...ns)+1:1).padStart(8,'0');}
function daysIn(p){const d=p.statusHistory&&p.statusHistory.length?p.statusHistory[p.statusHistory.length-1].at:p.createdAt;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function canAdv(p){const cur=p.status||'cadastrado';const nxt=STATUSES.find(s=>s.step===getSt(cur).step+1);if(!nxt)return false;if(nxt.key==='conferindo'&&!CONF_ROLES.includes(S.user.role))return false;return true;}
function nextSt(p){const c=getSt(p.status||'cadastrado');return STATUSES.find(s=>s.step===c.step+1)||null;}
function setSyncing(v){S.syncing=v;const d=document.querySelector('.sync-dot');if(d)d.className='sync-dot'+(v?' syncing':'');const t=document.querySelector('.sync-text');if(t)t.textContent=v?'Salvando...':'Sincronizado';}
function showToast(msg,type='success'){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.innerHTML=`<i class="ti ti-${type==='success'?'check':'alert-triangle'}"></i> ${msg}`;if(type==='error')t.style.background='var(--red)';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

function getNotifications(){
  const notifs=[];const today=new Date();today.setHours(0,0,0,0);
  S.processes.forEach(p=>{
    if(p.status==='registro')return;
    const days=daysIn(p);
    if(days>5)notifs.push({type:'danger',proto:p.protocol,id:p.id,msg:`Parado há ${days} dias na etapa "${getSt(p.status||'cadastrado').label}"`});
    else if(days>2)notifs.push({type:'warning',proto:p.protocol,id:p.id,msg:`${days} dias na etapa "${getSt(p.status||'cadastrado').label}"`});
    if(p.dataAssinatura){const diff=Math.ceil((new Date(p.dataAssinatura+'T12:00:00')-today)/86400000);if(diff>=0&&diff<=3)notifs.push({type:'info',proto:p.protocol,id:p.id,msg:`Assinatura em ${diff===0?'hoje':`${diff} dia(s)`} — ${partesNomes(p.transmitentes)}`});}
  });
  return notifs;
}

function renderProc(){
  let filtered=S.processes.filter(p=>{
    const s=S.search.toLowerCase();
    const tr=partesNomes(p.transmitentes).toLowerCase();
    const ad=partesNomes(p.adquirentes).toLowerCase();
    const cpfs=(partesCPFs(p.transmitentes)+' '+partesCPFs(p.adquirentes)).toLowerCase();
    const sf=[p.protocol,tr,ad,cpfs,p.matriculas||''].join(' ').toLowerCase();
    if(s&&!sf.includes(s))return false;
    if(S.filterNat&&p.natureza!==S.filterNat)return false;
    if(S.filterStatus&&(p.status||'cadastrado')!==S.filterStatus)return false;
    if(S.pipeFilter&&(p.status||'cadastrado')!==S.pipeFilter)return false;

    <tbody>${filtered.length===0?`<tr><td colspan="10" class="empty-state"><i class="ti ti-inbox"></i>Nenhum processo encontrado.</td></tr>`:
      filtered.map(p=>{const n=getNat(p.natureza);const s=getSt(p.status||'cadastrado');const{pct,done,total}=getClProg(p);const days=daysIn(p);
        const trNomes=partesNomes(p.transmitentes);const adNomes=partesNomes(p.adquirentes);
        const assProx=p.dataAssinatura&&Math.ceil((new Date(p.dataAssinatura+'T12:00:00')-new Date())/86400000)<=3&&Math.ceil((new Date(p.dataAssinatura+'T12:00:00')-new Date())/86400000)>=0;

// CALENDÁRIO
function renderCal(){
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m,1);const last=new Date(y,m+1,0);
  const startDow=first.getDay();const days=[];
  for(let i=0;i<startDow;i++)days.push({date:null});
  for(let d=1;d<=last.getDate();d++)days.push({date:new Date(y,m,d)});
  while(days.length%7!==0)days.push({date:null});
  const mName=first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const todayStr=new Date().toISOString().split('T')[0];
  const events={};
  S.processes.forEach(p=>{if(p.dataAssinatura){const k=p.dataAssinatura;if(!events[k])events[k]=[];events[k].push({label:`${p.protocol} — ${partesNomes(p.transmitentes)}`});}});
  return `<div class="page-header"><div><div class="page-title">Calendário</div></div>
    <div class="flex gap-sm"><button class="btn btn-secondary btn-sm" id="btnCalPrev"><i class="ti ti-chevron-left"></i></button><span style="font-size:14px;font-weight:600;min-width:160px;text-align:center;line-height:2">${mName}</span><button class="btn btn-secondary btn-sm" id="btnCalNext"><i class="ti ti-chevron-right"></i></button></div>
  </div>
  <div class="card">
    <div class="cal-header">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-grid">${days.map(({date})=>{if(!date)return`<div class="cal-day other-month"></div>`;const ds=date.toISOString().split('T')[0];const isToday=ds===todayStr;const evs=events[ds]||[];return`<div class="cal-day${isToday?' today':''}"><span class="cal-day-num">${date.getDate()}</span>${evs.map(e=>`<div class="cal-event assina" title="${e.label}">${e.label}</div>`).join('')}</div>`;}).join('')}</div>
  </div>
  <div class="card"><div class="card-header"><div class="card-title">Assinaturas do mês</div></div>
    ${S.processes.filter(p=>p.dataAssinatura&&p.dataAssinatura.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)).length===0?'<div class="empty-state" style="padding:1rem"><i class="ti ti-calendar-off"></i>Nenhuma assinatura neste mês.</div>':
    S.processes.filter(p=>p.dataAssinatura&&p.dataAssinatura.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)).sort((a,b)=>a.dataAssinatura>b.dataAssinatura?1:-1).map(p=>{const s=getSt(p.status||'cadastrado');return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><span class="proto-num">${p.protocol}</span> <span class="text-sm text-muted" style="margin-left:8px">${partesNomes(p.transmitentes)}</span></div><div class="flex items-center gap-sm"><span class="text-sm fw-600">${fD(p.dataAssinatura)}</span><span class="status-badge ${s.cls}">${s.label}</span></div></div>`;}).join('')}
  </div>`;
}

// PDF
function gerarPDF(title,processes){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape'});const hoje=new Date().toLocaleDateString('pt-BR');
  doc.setFontSize(14);doc.setTextColor(26,58,92);doc.text('1º Tabelionato de Notas e Registro de Imóveis de Marabá',14,15);
  doc.setFontSize(11);doc.text(title+' — '+hoje,14,22);doc.setFontSize(9);doc.setTextColor(100);doc.text(`Total: ${processes.length} processo(s)`,14,28);
  const rows=processes.map(p=>{const s=getSt(p.status||'cadastrado');const{pct}=getClProg(p);
    return[p.protocol,getNat(p.natureza).label.split(' — ')[0],partesNomes(p.transmitentes),partesNomes(p.adquirentes),p.matriculas||'—',fD(p.dataAbertura),fD(p.dataAssinatura),s.label,pct+'%'];});
  doc.autoTable({startY:32,head:[['Protocolo','Natureza','Transmitente(s)','Adquirente(s)','Matrícula','Abertura','Assinatura','Status','Docs']],body:rows,styles:{fontSize:8},headStyles:{fillColor:[26,58,92],textColor:255},alternateRowStyles:{fillColor:[245,244,240]}});
  doc.save(`${title.replace(/\s/g,'_')}_${hoje.replace(/\//g,'-')}.pdf`);showToast('PDF gerado!');
}

function tabPartes(p){

function tabCl(p,cl){if(!cl)return '<div class="empty-state"><i class="ti ti-file-unknown"></i>Checklist não configurado.</div>';const{done,total,pct}=getClProg(p);

function bindApp(){
  document.getElementById('btnLogout').onclick=()=>{S.user=null;render();};
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.onclick=()=>{S.page=el.dataset.page;S.pipeFilter=null;render();});
  document.querySelectorAll('[data-pipe]').forEach(el=>el.onclick=()=>{S.pipeFilter=S.pipeFilter===el.dataset.pipe?null:el.dataset.pipe;S.page='processos';render();});
  document.querySelectorAll('.notif-item[data-open]').forEach(el=>el.onclick=()=>{S.selectedProcess=S.processes.find(p=>p.id===el.dataset.open);if(S.selectedProcess){S.activeTab='dados';S.modal='ver';renderModal();}});
  const si=document.getElementById('sI');if(si)si.oninput=e=>{S.search=e.target.value;render();};
  const fN=document.getElementById('fN');if(fN)fN.onchange=e=>{S.filterNat=e.target.value;render();};
  const fS=document.getElementById('fS');if(fS)fS.onchange=e=>{S.filterStatus=e.target.value;render();};
  const fDF=document.getElementById('fDF');if(fDF)fDF.onchange=e=>{S.filterDateField=e.target.value;render();};
  const fDD=document.getElementById('fDD');if(fDD)fDD.onchange=e=>{S.filterDateFrom=e.target.value;render();};
  const fDT_=document.getElementById('fDT');if(fDT_)fDT_.onchange=e=>{S.filterDateTo=e.target.value;render();};
  const bcf=document.getElementById('btnCF');if(bcf)bcf.onclick=()=>{S.search='';S.filterNat='';S.filterStatus='';S.filterDateFrom='';S.filterDateTo='';S.pipeFilter=null;render();};
  const bcp=document.getElementById('btnCP');if(bcp)bcp.onclick=()=>{S.pipeFilter=null;render();};
  const bn=document.getElementById('btnNovo');if(bn)bn.onclick=()=>{S.formTransmitentes=[{nome:'',cpf:'',estadoCivil:'',conjuge:''}];S.formAdquirentes=[{nome:'',cpf:'',estadoCivil:'',conjuge:''}];S.formNatureza='compra_venda_urbano';S.modal='novo';renderModal();};
  const bnu=document.getElementById('btnNU');if(bnu)bnu.onclick=()=>{S.modal='novoUser';renderModal();};
  const bncl=document.getElementById('btnNCL');if(bncl)bncl.onclick=()=>{S.modal='novoCl';renderModal();};
  document.querySelectorAll('[data-open]').forEach(btn=>btn.onclick=()=>{S.selectedProcess=S.processes.find(p=>p.id===btn.dataset.open);S.activeTab='dados';S.editTransmitentes=null;S.editAdquirentes=null;S.modal='ver';renderModal();});
  document.querySelectorAll('[data-print]').forEach(btn=>btn.onclick=()=>{S.selectedProcess=S.processes.find(p=>p.id===btn.dataset.print);S.modal='capa';renderModal();});
  document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=async()=>{if(!confirm('Excluir este protocolo?'))return;setSyncing(true);await db.collection('processes').doc(btn.dataset.del).delete();setSyncing(false);showToast('Excluído.');});
  document.querySelectorAll('[data-du]').forEach(btn=>btn.onclick=async()=>{if(!confirm('Excluir usuário?'))return;await db.collection('users').doc(btn.dataset.du).delete();S.users=S.users.filter(u=>u.id!==btn.dataset.du);render();showToast('Excluído.');});
  document.querySelectorAll('[data-ecl]').forEach(btn=>btn.onclick=()=>{S.editingCl=btn.dataset.ecl;S.modal='editCl';renderModal();});
  const bcp2=document.getElementById('btnCalPrev');if(bcp2)bcp2.onclick=()=>{S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();};
  const bcn=document.getElementById('btnCalNext');if(bcn)bcn.onclick=()=>{S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}render();};
  const bep=document.getElementById('btnExpPDF');if(bep)bep.onclick=()=>{gerarPDF('Processos_Filtrados',S.processes);};
  const bpt=document.getElementById('btnPDFTodos');if(bpt)bpt.onclick=()=>gerarPDF('Todos_os_Processos',S.processes);
  const bpp=document.getElementById('btnPDFPend');if(bpp)bpp.onclick=()=>gerarPDF('Docs_Pendentes',S.processes.filter(p=>getClProg(p).pct<100));
  const bpa=document.getElementById('btnPDFAss');if(bpa)bpa.onclick=()=>gerarPDF('Aguardando_Assinatura',S.processes.filter(p=>(p.status||'cadastrado')==='aguard_assinatura'));
  const bph=document.getElementById('btnPDFHoje');if(bph)bph.onclick=()=>gerarPDF('Abertos_Hoje',S.processes.filter(p=>new Date(p.createdAt).toDateString()===new Date().toDateString()));
}

function bindModal(){
  const ov=document.getElementById('mOv');if(!ov)return;
  ov.querySelectorAll('#cm,#cm2').forEach(b=>b.onclick=()=>{S.modal=null;S.editTransmitentes=null;S.editAdquirentes=null;ov.remove();});
  const fNa=document.getElementById('fNa');
  if(fNa)fNa.onchange=e=>{S.formNatureza=e.target.value;ov.innerHTML=getMH();bindModal();};
  ov.querySelectorAll('[data-addparte]').forEach(btn=>btn.onclick=()=>{
    const prefix=btn.dataset.addparte;
    if(prefix==='fTr'){S.formTransmitentes=collectPartes('fTr',S.formTransmitentes);S.formTransmitentes.push({nome:'',cpf:'',estadoCivil:'',conjuge:''});}
    else if(prefix==='fAd'){S.formAdquirentes=collectPartes('fAd',S.formAdquirentes);S.formAdquirentes.push({nome:'',cpf:'',estadoCivil:'',conjuge:''});}
    else if(prefix==='eTr'){S.editTransmitentes=collectPartes('eTr',S.editTransmitentes);S.editTransmitentes.push({nome:'',cpf:'',estadoCivil:'',conjuge:''});}
    else if(prefix==='eAd'){S.editAdquirentes=collectPartes('eAd',S.editAdquirentes);S.editAdquirentes.push({nome:'',cpf:'',estadoCivil:'',conjuge:''});}
    ov.innerHTML=getMH();bindModal();
  });
  ov.querySelectorAll('[data-rmparte]').forEach(btn=>btn.onclick=()=>{
    const full=btn.dataset.rmparte;const lastU=full.lastIndexOf('_');const prefix=full.substring(0,lastU);const idx=parseInt(full.substring(lastU+1));
    if(prefix==='fTr'){S.formTransmitentes=collectPartes('fTr',S.formTransmitentes);S.formTransmitentes.splice(idx,1);}
    else if(prefix==='fAd'){S.formAdquirentes=collectPartes('fAd',S.formAdquirentes);S.formAdquirentes.splice(idx,1);}
    else if(prefix==='eTr'){S.editTransmitentes=collectPartes('eTr',S.editTransmitentes);S.editTransmitentes.splice(idx,1);}
    else if(prefix==='eAd'){S.editAdquirentes=collectPartes('eAd',S.editAdquirentes);S.editAdquirentes.splice(idx,1);}
    ov.innerHTML=getMH();bindModal();
  });
  const bsp=document.getElementById('btnSvP');
  if(bsp)bsp.onclick=async()=>{
    const pr=document.getElementById('fPr').value.trim();const na=document.getElementById('fNa').value;const da=document.getElementById('fDa').value;
    const transmitentes=collectPartes('fTr',S.formTransmitentes);const adquirentes=collectPartes('fAd',S.formAdquirentes);
    if(!pr||!na||!da||!transmitentes.length){document.getElementById('nErr').innerHTML='<div class="error-msg">Preencha: protocolo, natureza, data e ao menos um transmitente.</div>';return;}
    if(S.processes.find(p=>p.protocol===pr)){document.getElementById('nErr').innerHTML='<div class="error-msg">Protocolo já existe.</div>';return;}
    bsp.disabled=true;
    const np={id:'p'+Date.now()+Math.random().toString(36).slice(2,6),protocol:pr,natureza:na,transmitentes,adquirentes,
      matriculas:document.getElementById('fMa').value.trim(),dataAbertura:da,dataAssinatura:document.getElementById('fDs').value,
      responsavel:document.getElementById('fRe').value.trim(),valor:document.getElementById('fVl').value.trim(),
      status:'cadastrado',statusHistory:[{status:'cadastrado',by:S.user.id,at:new Date().toISOString()}],
      createdBy:S.user.id,createdAt:new Date().toISOString(),checklist:initCl(na),comments:[]};
    setSyncing(true);await db.collection('processes').doc(np.id).set(np);setSyncing(false);
    S.selectedProcess=np;S.activeTab='dados';S.editTransmitentes=null;S.editAdquirentes=null;S.modal='ver';
    ov.remove();render();renderModal();showToast('Protocolo '+pr+' criado!');
  };
  ov.querySelectorAll('.tab[data-tab]').forEach(t=>t.onclick=()=>{if(t.dataset.tab!=='partes'){S.editTransmitentes=null;S.editAdquirentes=null;}S.activeTab=t.dataset.tab;ov.innerHTML=getMH();bindModal();});
  const ba=document.getElementById('btnAdv');
  if(ba)ba.onclick=async()=>{const p=S.selectedProcess;const nxt=nextSt(p);if(!nxt)return;if(nxt.key==='conferindo'&&!CONF_ROLES.includes(S.user.role)){showToast('Apenas escreventes podem conferir!','error');return;}const hist=[...(p.statusHistory||[]),{status:nxt.key,by:S.user.id,at:new Date().toISOString()}];setSyncing(true);await db.collection('processes').doc(p.id).update({status:nxt.key,statusHistory:hist});setSyncing(false);p.status=nxt.key;p.statusHistory=hist;const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]={...p};ov.innerHTML=getMH();bindModal();showToast('Avançado para: '+nxt.label);};
  const bse=document.getElementById('btnSvE');
  if(bse)bse.onclick=async()=>{const p=S.selectedProcess;const upd={...p,protocol:document.getElementById('ep_pr').value.trim(),matriculas:document.getElementById('ep_ma').value.trim(),dataAbertura:document.getElementById('ep_da').value,dataAssinatura:document.getElementById('ep_ds').value,responsavel:document.getElementById('ep_re').value.trim(),valor:document.getElementById('ep_vl').value.trim(),updatedBy:S.user.id,updatedAt:new Date().toISOString()};bse.disabled=true;setSyncing(true);await db.collection('processes').doc(p.id).update(upd);setSyncing(false);S.selectedProcess=upd;const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]=upd;ov.innerHTML=getMH();bindModal();showToast('Dados salvos!');};
  const bsvp=document.getElementById('btnSvPartes');
  if(bsvp)bsvp.onclick=async()=>{const p=S.selectedProcess;const transmitentes=collectPartes('eTr',S.editTransmitentes||[]);const adquirentes=collectPartes('eAd',S.editAdquirentes||[]);if(!transmitentes.length){showToast('Adicione ao menos um transmitente.','error');return;}const upd={...p,transmitentes,adquirentes,updatedBy:S.user.id,updatedAt:new Date().toISOString()};bsvp.disabled=true;setSyncing(true);await db.collection('processes').doc(p.id).update(upd);setSyncing(false);S.selectedProcess=upd;S.editTransmitentes=null;S.editAdquirentes=null;const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]=upd;ov.innerHTML=getMH();bindModal();showToast('Partes salvas!');};
  ov.querySelectorAll('input[type=checkbox][data-si]').forEach(el=>el.onchange=async(e)=>{const si=parseInt(e.target.dataset.si),ii=parseInt(e.target.dataset.ii);const p=S.selectedProcess;if(!p.checklist[si])p.checklist[si]={};p.checklist[si][ii]=e.target.checked;setSyncing(true);await db.collection('processes').doc(p.id).update({checklist:p.checklist});setSyncing(false);const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]={...p};ov.innerHTML=getMH();bindModal();});
  const bac=document.getElementById('btnAC');
  if(bac){const send=async()=>{const tx=document.getElementById('nCm').value.trim();if(!tx)return;const p=S.selectedProcess;const cs=[...(p.comments||[]),{id:'c'+Date.now(),authorId:S.user.id,text:tx,createdAt:new Date().toISOString()}];setSyncing(true);await db.collection('processes').doc(p.id).update({comments:cs});setSyncing(false);p.comments=cs;const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]={...p};ov.innerHTML=getMH();bindModal();};bac.onclick=send;const nc=document.getElementById('nCm');if(nc)nc.onkeydown=e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))send();};}
  ov.querySelectorAll('[data-dc]').forEach(btn=>btn.onclick=async()=>{const ci=parseInt(btn.dataset.dc);const p=S.selectedProcess;const cs=[...(p.comments||[])];cs.splice(ci,1);setSyncing(true);await db.collection('processes').doc(p.id).update({comments:cs});setSyncing(false);p.comments=cs;const idx=S.processes.findIndex(x=>x.id===p.id);if(idx>=0)S.processes[idx]={...p};ov.innerHTML=getMH();bindModal();});
  const bprt=document.getElementById('btnPrt');if(bprt)bprt.onclick=()=>{S.modal='capa';ov.innerHTML=getMH();bindModal();};
  const bsu=document.getElementById('btnSvU');
  if(bsu)bsu.onclick=async()=>{const n=document.getElementById('nu_n').value.trim(),u=document.getElementById('nu_u').value.trim(),p=document.getElementById('nu_p').value,r=document.getElementById('nu_r').value;if(!n||!u||!p){document.getElementById('nuE').innerHTML='<div class="error-msg">Preencha todos.</div>';return;}if(p.length<6){document.getElementById('nuE').innerHTML='<div class="error-msg">Senha mínimo 6 caracteres.</div>';return;}if(S.users.find(x=>x.username===u)){document.getElementById('nuE').innerHTML='<div class="error-msg">Usuário já existe.</div>';return;}const nu={id:'u'+Date.now(),name:n,username:u,password:p,role:r,createdAt:new Date().toISOString()};await db.collection('users').doc(nu.id).set(nu);S.users.push(nu);S.modal=null;ov.remove();render();showToast('Usuário '+n+' criado!');};
  const bscl=document.getElementById('btnSvCL');
  if(bscl)bscl.onclick=async()=>{const k=S.editingCl;const cl=JSON.parse(JSON.stringify(S.checklists[k]));cl.name=document.getElementById('cl_n').value.trim();cl.sections.forEach((s,si)=>{const te=ov.querySelector('.cl_st[data-si="'+si+'"]');if(te)s.title=te.value;const its=[];ov.querySelectorAll('.cl_it[data-si="'+si+'"]').forEach(e=>its.push(e.value));s.items=its;});S.checklists[k]=cl;setSyncing(true);await db.collection('config').doc('checklists').set({data:S.checklists});setSyncing(false);S.modal=null;ov.remove();render();showToast('Checklist salvo!');};
  ov.querySelectorAll('[data-ai]').forEach(b=>b.onclick=()=>{S.checklists[S.editingCl].sections[parseInt(b.dataset.ai)].items.push('Novo item');ov.innerHTML=getMH();bindModal();});
  ov.querySelectorAll('[data-di]').forEach(b=>b.onclick=()=>{const[si,ii]=b.dataset.di.split('-').map(Number);S.checklists[S.editingCl].sections[si].items.splice(ii,1);ov.innerHTML=getMH();bindModal();});
  ov.querySelectorAll('[data-ds]').forEach(b=>b.onclick=()=>{if(!confirm('Remover seção?'))return;S.checklists[S.editingCl].sections.splice(parseInt(b.dataset.ds),1);ov.innerHTML=getMH();bindModal();});
  const bas=document.getElementById('btnAS');if(bas)bas.onclick=()=>{S.checklists[S.editingCl].sections.push({title:'Nova Seção',items:['Novo item']});ov.innerHTML=getMH();bindModal();};
  const bccl=document.getElementById('btnCrCL');
  if(bccl)bccl.onclick=async()=>{const k=document.getElementById('ncl_k').value.trim().replace(/\s/g,'_'),n=document.getElementById('ncl_n').value.trim();if(!k||!n){document.getElementById('nclE').innerHTML='<div class="error-msg">Preencha chave e nome.</div>';return;}if(S.checklists[k]){document.getElementById('nclE').innerHTML='<div class="error-msg">Chave já existe.</div>';return;}S.checklists[k]={name:n,sections:[{title:'Documentos necessários',items:['Item 1']}]};S.editingCl=k;S.modal='editCl';ov.innerHTML=getMH();bindModal();};
}

init();
</script>
</body>
</html>
