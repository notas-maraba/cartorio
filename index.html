<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Tabelionato de Notas de Maraba</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0da;--text:#1a1917;--muted:#6b6860;--accent:#1a3a5c;--accent2:#c8a96e;--green:#2d6a4f;--red:#8b1a1a;--font:"IBM Plex Sans",sans-serif;--mono:"IBM Plex Mono",monospace;--r:6px;--r2:10px}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);color:#fff;gap:1rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);padding:2rem}
.login-card{background:var(--surface);border-radius:var(--r2);padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:2rem}
.seal{width:72px;height:72px;background:var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-bottom:1rem}
.login-logo h1{font-size:17px;font-weight:600;color:var(--accent);line-height:1.4}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.field input:disabled{background:var(--surface2);color:var(--muted)}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#122d4a}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.btn-success{background:#dcfce7;color:var(--green);border:1px solid #86efac}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:var(--red);font-size:12px;padding:8px 10px;background:#fee2e2;border-radius:var(--r);margin-top:6px}
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;flex:1}
.topbar-brand span{color:var(--accent2);font-family:var(--mono);font-size:11px;display:block;font-weight:400}
.topbar-user{font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.user-badge{width:30px;height:30px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;font-size:12px;border-radius:var(--r);cursor:pointer;font-family:var(--font)}
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{padding:9px 1.25rem;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;border-left:3px solid transparent;transition:all .1s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#e8f0f8;color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item i{font-size:17px}
.nav-section{padding:12px 1.25rem 4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.main{flex:1;overflow-y:auto;padding:1.75rem;max-width:1300px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;color:var(--accent)}
.page-subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-value{font-size:30px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.sb1{background:#e0f2fe;color:#0369a1}.sb2{background:#fef9c3;color:#854d0e}
.sb3{background:#fef3c7;color:#92400e}.sb4{background:#fce7f3;color:#9d174d}
.sb5{background:#f3e8ff;color:#6b21a8}.sb6{background:#dbeafe;color:#1e40af}
.sb7{background:#dcfce7;color:#166534}.sb8{background:#1a3a5c;color:#fff}
.pipeline{display:flex;overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem}
.pipe-step{flex:1;min-width:90px;padding:.75rem .5rem;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-right:1px solid var(--border)}
.pipe-step:last-child{border-right:none}
.pipe-step .pipe-count{font-size:22px;font-weight:700;font-family:var(--mono);display:block;margin-bottom:2px}
.pipe-step.active{outline:3px solid var(--accent);outline-offset:-3px;z-index:1}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.proto-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);background:#e8f0f8;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;display:inline-block}
.badge-compra{background:#dbeafe;color:#1e40af}.badge-rural{background:#dcfce7;color:#166534}
.badge-divorcio{background:#fce7f3;color:#9d174d}.badge-inventario{background:#fef3c7;color:#92400e}
.badge-doacao{background:#f3e8ff;color:#6b21a8}.badge-testamento{background:#ffedd5;color:#9a3412}
.badge-sup{background:#fef3c7;color:#92400e}.badge-esc{background:#dbeafe;color:#1e40af}
.alert{padding:.75rem 1rem;border-radius:var(--r);font-size:12px;display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.75rem}
.alert-warning{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.alert-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--red)}
.alert-info{background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1}
.notif-badge{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-left:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:1.5rem;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:860px;box-shadow:0 25px 80px rgba(0,0,0,.35);margin:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--surface);border-radius:var(--r2) var(--r2) 0 0;z-index:2}
.modal-title{font-size:16px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.modal-body{padding:1.5rem;max-height:calc(100vh - 200px);overflow-y:auto}
.modal-footer{padding:1.25rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;flex-wrap:wrap}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1;padding:2px 4px;border-radius:4px}
.close-btn:hover{background:var(--surface2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.col-span-2{grid-column:span 2}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:1.25rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.parte-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;margin-bottom:.75rem}
.parte-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.parte-label{font-size:12px;font-weight:600;color:var(--accent)}
.parte-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.parte-grid .field{margin-bottom:0}
.checklist-section{margin-bottom:1.25rem}
.cl-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);padding:6px 10px;background:#e8f0f8;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer}
.check-item:hover{background:var(--surface2)}
.check-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--accent);cursor:pointer}
.check-item label{cursor:pointer;line-height:1.5;font-size:13px}
.check-item.checked label{text-decoration:line-through;color:var(--muted)}
.prog-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;background:var(--surface2);padding:.75rem 1rem;border-radius:var(--r2)}
.prog-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
.comment{padding:.875rem;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:.75rem}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap}
.comment-author{font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.comment-date{font-size:11px;color:var(--muted)}
.comment-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.comment-box{display:flex;gap:.75rem;margin-top:1rem;align-items:flex-end}
.comment-box textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;resize:none;height:70px}
.filters{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface)}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.filter-select,.filter-date{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);cursor:pointer}
@media print{.no-print{display:none!important}.modal-overlay{position:static;background:none;padding:0}.modal{box-shadow:none;border:none}.modal-header,.modal-footer{display:none!important}.modal-body{max-height:none;overflow:visible}body{background:white}}
.cover-preview{background:white;border:1px solid #ccc;border-radius:var(--r2);padding:1.75rem;color:#000}
.cover-header{text-align:center;border-bottom:2px solid #1a3a5c;padding-bottom:1rem;margin-bottom:1rem}
.cover-header h2{font-size:15px;color:#1a3a5c;font-weight:700;margin-bottom:3px}
.cover-header p{font-size:11px;color:#555;margin-top:2px}
.cover-proto{font-family:var(--mono);font-size:22px;font-weight:700;color:#1a3a5c;text-align:center;margin:1rem 0;padding:.75rem;background:#e8f0f8;border-radius:6px;letter-spacing:2px}
.cover-section{margin-bottom:1rem}
.cover-section h3{font-size:10px;font-weight:700;text-transform:uppercase;color:#1a3a5c;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:.5rem}
.cover-row{display:flex;gap:.5rem;margin-bottom:.2rem}
.cover-label{font-size:11px;font-weight:600;color:#333;min-width:130px;flex-shrink:0}
.cover-val{font-size:11px;color:#111;flex:1}
.cover-parte{font-size:11px;padding:3px 0;border-bottom:1px dotted #eee}
.cover-docs{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.75rem}
.cover-footer{margin-top:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;padding-top:1rem;border-top:1px solid #ccc}
.cover-sig{text-align:center;padding-top:2rem;border-top:1px solid #333;font-size:10px;color:#333;margin-top:.5rem}
.prod-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.prod-name{width:150px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.prod-bar-wrap{flex:1;height:20px;background:var(--surface2);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.prod-bar-fill{height:100%;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;padding-left:8px;transition:width .5s}
.prod-bar-fill span{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
.prod-count{font-size:13px;font-family:var(--mono);font-weight:600;color:var(--accent);width:30px;text-align:right;flex-shrink:0}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.cl-item-row{display:flex;align-items:center;gap:.5rem;padding:5px 6px;background:var(--surface2);border-radius:var(--r);margin-bottom:4px}
.cl-item-row input{flex:1;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;font-family:var(--font)}
.history-item{display:flex;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:12px}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cal-day{min-height:60px;padding:4px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-size:11px}
.cal-day.today{background:#e8f0f8;border-color:var(--accent)}
.cal-day.other-month{background:var(--surface2);opacity:.5}
.cal-day-num{font-weight:600;font-size:12px;margin-bottom:3px;display:block}
.cal-event{background:var(--green);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-item{padding:.75rem;border-radius:var(--r);border:1px solid var(--border);margin-bottom:.5rem;display:flex;gap:.75rem;align-items:flex-start;cursor:pointer}
.notif-item.danger{border-color:#fca5a5;background:#fee2e2}
.notif-item.warning{border-color:#fde047;background:#fef9c3}
.notif-item.info{border-color:#7dd3fc;background:#e0f2fe}
.flex{display:flex}.gap-sm{gap:.5rem}.gap-md{gap:.75rem}.items-center{align-items:center}
.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}.fw-600{font-weight:600}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mb-sm{margin-bottom:.5rem}.mb-md{margin-bottom:1rem}
.divider{height:1px;background:var(--border);margin:1rem 0}
.empty-state{text-align:center;padding:3rem;color:var(--muted)}
.empty-state i{font-size:40px;display:block;margin-bottom:.75rem;opacity:.4}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#fff;padding:.75rem 1.25rem;border-radius:var(--r2);font-size:13px;z-index:9999;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.stale-badge{background:#fee2e2;color:var(--red);border-radius:4px;font-size:10px;padding:2px 6px;font-weight:600}
</style>
</head>

// HELPERS
function gn(k){for(var i=0;i<NATS.length;i++)if(NATS[i].key===k)return NATS[i];return{key:k,label:k,badge:"badge-compra"};}
function gs(k){for(var i=0;i<STS.length;i++)if(STS[i].key===k)return STS[i];return STS[0];}
function gun(id){for(var i=0;i<A.users.length;i++)if(A.users[i].id===id)return A.users[i].name;return id||"?";}
function ini(n){if(!n)return"??";var p=n.split(" "),r="";for(var i=0;i<p.length&&r.length<2;i++)if(p[i].length>0)r+=p[i][0];return r.toUpperCase()||"??";}
function fd(d){if(!d)return"---";try{return new Date(d+"T12:00:00").toLocaleDateString("pt-BR");}catch(e){return d;}}
function fdt(d){if(!d)return"---";try{return new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){return d;}}
function ex(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function gl(nat){return PLABELS[nat]||{tr:"Transmitente(s)",ad:"Adquirente(s)"};}
function pn(partes){if(!partes||!partes.length)return"---";var ns=[];for(var i=0;i<partes.length;i++)if(partes[i].n)ns.push(partes[i].n);return ns.join(" e ")||"---";}
function gcp(p){var cl=A.checklists[p.natureza];if(!cl)return{done:0,total:0,pct:0};var t=0,d=0;for(var si=0;si<cl.sections.length;si++)for(var ii=0;ii<cl.sections[si].items.length;ii++){t++;if(p.checklist&&p.checklist[si]&&p.checklist[si][ii])d++;}return{done:d,total:t,pct:t?Math.round(d/t*100):0};}
function icl(nat){var cl=A.checklists[nat];if(!cl)return{};var o={};for(var si=0;si<cl.sections.length;si++)o[si]={};return o;}
function gproto(){var ns=[];for(var i=0;i<A.processes.length;i++){var n=parseInt(A.processes[i].protocol.replace(/\D/g,""));if(!isNaN(n))ns.push(n);}var nx=ns.length?Math.max.apply(null,ns)+1:1;var s=String(nx);while(s.length<8)s="0"+s;return s;}
function days(p){var d=(p.statusHistory&&p.statusHistory.length)?p.statusHistory[p.statusHistory.length-1].at:p.createdAt;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function cad(p){var cs=gs(p.status||"cadastrado").step;var nx=null;for(var i=0;i<STS.length;i++)if(STS[i].step===cs+1){nx=STS[i];break;}if(!nx)return false;if(nx.key==="conferindo"){var ok=false;for(var j=0;j<CONF_ROLES.length;j++)if(CONF_ROLES[j]===A.user.role){ok=true;break;}if(!ok)return false;}return true;}
function nxst(p){var cs=gs(p.status||"cadastrado").step;for(var i=0;i<STS.length;i++)if(STS[i].step===cs+1)return STS[i];return null;}
function ssy(v){A.sync=v;var d=document.querySelector(".sync-dot");if(d)d.className="sync-dot"+(v?" syncing":"");var t=document.querySelector(".sync-text");if(t)t.textContent=v?"Salvando...":"Sincronizado";}
function toast(msg,tp){var e=document.querySelector(".toast");if(e)e.remove();var t=document.createElement("div");t.className="toast";t.innerHTML='<i class="ti ti-'+(tp==="error"?"alert-triangle":"check")+'"></i> '+msg;if(tp==="error")t.style.background="var(--red)";document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}
function notifs(){
  var r=[],today=new Date();today.setHours(0,0,0,0);
  for(var i=0;i<A.processes.length;i++){
    var p=A.processes[i];if(p.status==="registro")continue;
    var d=days(p);
    if(d>5)r.push({tp:"danger",proto:p.protocol,id:p.id,msg:"Parado ha "+d+" dias na etapa "+gs(p.status||"cadastrado").label});
    else if(d>2)r.push({tp:"warning",proto:p.protocol,id:p.id,msg:d+" dias na etapa "+gs(p.status||"cadastrado").label});
    if(p.dataAssinatura){var df=Math.ceil((new Date(p.dataAssinatura+"T12:00:00")-today)/86400000);if(df>=0&&df<=3)r.push({tp:"info",proto:p.protocol,id:p.id,msg:"Assinatura em "+(df===0?"hoje":df+" dia(s)")+" - "+pn(p.transmitentes)});}
  }
  return r;
}

  };
  var chks=ov.querySelectorAll("input[type=checkbox][data-si]");
  for(var chi=0;chi<chks.length;chi++)(function(el){el.onchange=function(e){var si=parseInt(e.target.dataset.si),ii=parseInt(e.target.dataset.ii),p=A.sel;if(!p.checklist[si])p.checklist[si]={};p.checklist[si][ii]=e.target.checked;ssy(true);db.collection("processes").doc(p.id).update({checklist:p.checklist}).then(function(){ssy(false);for(var i=0;i<A.processes.length;i++)if(A.processes[i].id===p.id){A.processes[i]=JSON.parse(JSON.stringify(p));break;}ov.innerHTML=gMH();bindModal();});};})(chks[chi]);
  var bACEl=document.getElementById("bAC");
  if(bACEl){
    function sendC(){var tx=document.getElementById("nCm").value.trim();if(!tx)return;var p=A.sel,cs=JSON.parse(JSON.stringify(p.comments||[]));cs.push({id:"c"+Date.now(),authorId:A.user.id,text:tx,createdAt:new Date().toISOString()});ssy(true);db.collection("processes").doc(p.id).update({comments:cs}).then(function(){ssy(false);p.comments=cs;for(var i=0;i<A.processes.length;i++)if(A.processes[i].id===p.id){A.processes[i]=JSON.parse(JSON.stringify(p));break;}ov.innerHTML=gMH();bindModal();});}
    bACEl.onclick=sendC;var ncEl=document.getElementById("nCm");if(ncEl)ncEl.onkeydown=function(e){if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))sendC();};
  }
  var dcs=ov.querySelectorAll("[data-dc]");
  for(var dci2=0;dci2<dcs.length;dci2++)(function(btn){btn.onclick=function(){var ci2=parseInt(btn.dataset.dc),p=A.sel,cs=JSON.parse(JSON.stringify(p.comments||[]));cs.splice(ci2,1);ssy(true);db.collection("processes").doc(p.id).update({comments:cs}).then(function(){ssy(false);p.comments=cs;for(var i=0;i<A.processes.length;i++)if(A.processes[i].id===p.id){A.processes[i]=JSON.parse(JSON.stringify(p));break;}ov.innerHTML=gMH();bindModal();});};})(dcs[dci2]);
  var bPrtEl=document.getElementById("bPrt");if(bPrtEl)bPrtEl.onclick=function(){A.modal="capa";ov.innerHTML=gMH();bindModal();};
  var bSvUEl=document.getElementById("bSvU");
  if(bSvUEl)bSvUEl.onclick=function(){
    var nm=document.getElementById("nuN").value.trim(),us=document.getElementById("nuU").value.trim(),pw=document.getElementById("nuP").value,rl=document.getElementById("nuR").value;
    if(!nm||!us||!pw){document.getElementById("nuE").innerHTML='<div class="error-msg">Preencha todos.</div>';return;}
    if(pw.length<6){document.getElementById("nuE").innerHTML='<div class="error-msg">Senha minimo 6 caracteres.</div>';return;}
    for(var ui2=0;ui2<A.users.length;ui2++)if(A.users[ui2].username===us){document.getElementById("nuE").innerHTML='<div class="error-msg">Usuario ja existe.</div>';return;}
    var nu={id:"u"+Date.now(),name:nm,username:us,password:pw,role:rl,createdAt:new Date().toISOString()};
    db.collection("users").doc(nu.id).set(nu).then(function(){A.users.push(nu);A.modal=null;ov.remove();render();toast("Usuario "+nm+" criado!");});
  };
  var bSvCLEl=document.getElementById("bSvCL");
  if(bSvCLEl)bSvCLEl.onclick=function(){
    var k=A.ecl,cl=JSON.parse(JSON.stringify(A.checklists[k]));cl.name=document.getElementById("clN").value.trim();
    var sts=ov.querySelectorAll(".cl_st");for(var sti=0;sti<sts.length;sti++)cl.sections[parseInt(sts[sti].dataset.si)].title=sts[sti].value;
    for(var si2=0;si2<cl.sections.length;si2++){var its=ov.querySelectorAll('.cl_it[data-si="'+si2+'"]'),items=[];for(var ii3=0;ii3<its.length;ii3++)items.push(its[ii3].value);cl.sections[si2].items=items;}
    A.checklists[k]=cl;ssy(true);db.collection("config").doc("checklists").set({data:A.checklists}).then(function(){ssy(false);A.modal=null;ov.remove();render();toast("Checklist salvo!");});
  };
  var ais=ov.querySelectorAll("[data-ai]");for(var aii=0;aii<ais.length;aii++)(function(btn){btn.onclick=function(){A.checklists[A.ecl].sections[parseInt(btn.dataset.ai)].items.push("Novo item");ov.innerHTML=gMH();bindModal();};})(ais[aii]);
  var dis=ov.querySelectorAll("[data-di]");for(var dii=0;dii<dis.length;dii++)(function(btn){btn.onclick=function(){var p2=btn.dataset.di.split("-"),si3=parseInt(p2[0]),ii4=parseInt(p2[1]);A.checklists[A.ecl].sections[si3].items.splice(ii4,1);ov.innerHTML=gMH();bindModal();};})(dis[dii]);
  var dss=ov.querySelectorAll("[data-ds]");for(var dsi=0;dsi<dss.length;dsi++)(function(btn){btn.onclick=function(){if(!confirm("Remover secao?"))return;A.checklists[A.ecl].sections.splice(parseInt(btn.dataset.ds),1);ov.innerHTML=gMH();bindModal();};})(dss[dsi]);
  var bASEl=document.getElementById("bAS");if(bASEl)bASEl.onclick=function(){A.checklists[A.ecl].sections.push({title:"Nova Secao",items:["Novo item"]});ov.innerHTML=gMH();bindModal();};
  var bCrCLEl=document.getElementById("bCrCL");
  if(bCrCLEl)bCrCLEl.onclick=function(){
    var k=document.getElementById("nclK").value.trim().replace(/\s/g,"_"),nm=document.getElementById("nclN").value.trim();
    if(!k||!nm){document.getElementById("nclE").innerHTML='<div class="error-msg">Preencha chave e nome.</div>';return;}
    if(A.checklists[k]){document.getElementById("nclE").innerHTML='<div class="error-msg">Chave ja existe.</div>';return;}
    A.checklists[k]={name:nm,sections:[{title:"Documentos necessarios",items:["Item 1"]}]};A.ecl=k;A.modal="editCl";ov.innerHTML=gMH();bindModal();
  };
}

// INICIAR
startApp();
</script>
